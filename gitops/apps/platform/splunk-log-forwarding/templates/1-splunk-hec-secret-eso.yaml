---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.hecSecretName | lower }}
  namespace: {{ .Values.namespaceOverride }}
  annotations:
    managed-by: argocd.argoproj.io
    # argocd.argoproj.io/sync-wave: "1"
    # "helm.sh/hook": ""
    "helm.sh/hook-weight": "1"
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"
spec:
  # Interval for refreshing from the configured secret backend
  refreshInterval: 5m

  # Name of the SecretStore/ClusterSecretStore used to authenticate to the secret backend
  secretStoreRef:
    kind: ClusterSecretStore
    name: "{{ .Values.clusterSecretStoreName  | lower }}"

  data:
    - secretKey: splunk_platform_hec_token
      remoteRef:
        key: "{{ .Values.hecSecretName }}"
  # Name of the Secret to be created
  target:
    name: {{ .Values.hecSecretName  | lower }}
    creationPolicy: "Owner"
    template:
      # Possible Values: "Opaque", "kubernetes.io/dockerconfigjson", "kubernetes.io/tls", "kubernetes.io/ssh-auth"
      mergePolicy: Merge
      type: Opaque
      data:
        splunk_platform_hec_token: "{{ `{{ .splunk_platform_hec_token }}` }}"
