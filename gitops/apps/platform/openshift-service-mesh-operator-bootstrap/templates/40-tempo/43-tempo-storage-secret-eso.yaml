---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.operators.tempo.gcs.secretName | lower }}
  namespace: {{ .Values.operators.tempo.namespace }}
  annotations:
    managed-by: argocd.argoproj.io
    # argocd.argoproj.io/sync-wave: "43"
    # "helm.sh/hook": ""
    "helm.sh/hook-weight": "43"
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"
spec:
  refreshInterval: 5m
  secretStoreRef:
    kind: ClusterSecretStore
    name: {{ .Values.clusterSecretStoreName }}
  data:
    - secretKey: key_json
      remoteRef:
        key: {{ .Values.operators.tempo.gcs.remoteSecretKey | quote }}
  target:
    name: {{ .Values.operators.tempo.gcs.secretName | lower }}
    creationPolicy: "Owner"
    template:
      # Possible Values: "Opaque", "kubernetes.io/dockerconfigjson", "kubernetes.io/tls", "kubernetes.io/ssh-auth"
      type: Opaque
      data:
        bucketname: {{ .Values.operators.tempo.gcs.bucketName | quote }}
        audience: {{ .Values.operators.tempo.gcs.audience | quote }}
        "key.json": "{{ `{{ .key_json }}` }}"
