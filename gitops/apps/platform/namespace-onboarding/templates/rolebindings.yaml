{{- range .Values.namespaces }}
{{- $namespace := .name }}
{{- range .roleBindings }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ default (printf "%s-%s" $namespace .role) .name }}
  namespace: {{ $namespace }}
subjects:
{{- if .subjects }}
{{ toYaml .subjects | indent 2 }}
{{- else if .group }}
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: {{ .group }}
{{- else if .serviceAccount }}
  - kind: ServiceAccount
    name: {{ .serviceAccount.name }}
    namespace: {{ default $namespace .serviceAccount.namespace }}
{{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .role }}
{{- end }}
{{- end }}
