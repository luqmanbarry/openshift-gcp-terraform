  #     projectID: {{ .Values.provider.gcpsm.projectID }} # Override per ExternalSecret
  #     auth:
  #       workloadIdentity:
  #         clusterLocation: {{ .Values.clusterLocation }}
  #         clusterName: {{ .Values.clusterName }}
  #         clusterProjectID: {{ .Values.provider.gcpsm.projectID }}
  #         serviceAccountRef:
  #           name: "{{ .Values.clusterName }}-day2-gitops"
  #           namespace: {{ .Values.tf_resources_namespace }}