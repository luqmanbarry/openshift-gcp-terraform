# Create SCC for IC resources
{{ range $controller := .Values.controllers }}
---
allowHostDirVolumePlugin: true
allowHostIPC: true
allowHostNetwork: true
allowHostPID: true
allowHostPorts: true
allowPrivilegedContainer: true
allowPrivilegeEscalation: true
allowedCapabilities: 
- '*'
apiVersion: security.openshift.io/v1
defaultAddCapabilities: [] 
fsGroup: 
  type: RunAsAny
groups: 
- system:cluster-admins
- system:nodes
kind: SecurityContextConstraints
metadata:
  name: "{{ $controller.namespace }}-{{ $controller.ingressClassName }}"
  annotations:
    managed-by: argocd.argoproj.io
    # argocd.argoproj.io/sync-wave: "1"
    # "helm.sh/hook": ""
    "helm.sh/hook-weight": "1"
    argocd.argoproj.io/sync-options: "SkipDryRunOnMissingResource=true"
priority: null
readOnlyRootFilesystem: false
requiredDropCapabilities: []
runAsUser: 
  type: RunAsAny
seLinuxContext: 
  type: RunAsAny
seccompProfiles:
- '*'
supplementalGroups: 
  type: RunAsAny
users:
 - "system:serviceaccount:{{ $controller.namespace }}:nginx-ingress"
 - "system:serviceaccount:{{ $controller.namespace }}:{{ $controller.ingressClassName }}"
 - "system:serviceaccount:{{ $controller.namespace }}:{{ $controller.ingressClassName }}-operator-controller-manager"
{{ end }}