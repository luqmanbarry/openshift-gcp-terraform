namespace: external-secrets-operator
subscription:
  channel: stable
  installPlanApproval: Automatic
  name: external-secrets-operator
  source: community-operators
  sourceNamespace: openshift-marketplace

clusterSecretStore:
  enabled: true
  name: platform-secrets
  spec:
    provider:
      gcpsm:
        projectID: changeme-project
        auth:
          workloadIdentityFederation:
            audience: "//iam.googleapis.com/projects/PROJECT_NUMBER/locations/global/workloadIdentityPools/gcp-classic-day2-gitops/providers/gcp-classic-day2-gitops"
            serviceAccountRef:
              name: external-secrets-operator
              namespace: external-secrets-operator

cleanupOnDelete:
  enabled: false
